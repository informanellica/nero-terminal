<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <title>nero-terminal — X11</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #000; color: #ddd; font-family: system-ui, sans-serif; overflow: hidden; }
    body { display: flex; flex-direction: column; }
    /* The window IS the remote app — no in-app chrome; the native title bar shows
       the X window's title and its close button closes the app. */
    #pop-wrap { flex: 1 1 auto; min-height: 0; position: relative; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
    #pop-canvas { max-width: 100%; max-height: 100%; outline: none; }
    #pop-overlay {
      position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      color: #ccc; background: rgba(0,0,0,.6); text-align: center; padding: 16px; font-size: 14px;
    }
    #pop-overlay.show { display: flex; }
  </style>
</head>
<body>
  <div id="pop-wrap">
    <canvas id="pop-canvas" tabindex="0"></canvas>
    <div id="pop-overlay">Starting…</div>
  </div>
  <script type="module" src="gui-popup.mjs"></script>
</body>
</html>
